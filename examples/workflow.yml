# Example workflow to drop into .github/workflows/zelda.yml of your
# <username>/<username> profile repository.

name: Generate Zelda Contribution Graph

on:
  schedule:
    # Run every 24 hours at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Zelda contribution graph
        uses: YOUR_GITHUB_USERNAME/zelda-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/zelda-contribution-graph.svg
            dist/zelda-contribution-graph-light.svg

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
